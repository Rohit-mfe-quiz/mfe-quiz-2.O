        .speaker-btn { background: #eff6ff; color: var(--p); border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 1.2rem; }

// --- AUDIO SYSTEM (No external files needed) ---
const AudioContext = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function initAudio() {
    if(!audioCtx) audioCtx = new AudioContext();
    if(audioCtx.state === 'suspended') audioCtx.resume();
}

function playSound(type) {
    if(!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    if (type === 'correct') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime); 
        osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    } else {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        osc.start(); osc.stop(audioCtx.currentTime + 0.4);
    }
}

let currentWords = [], qIdx = 0, score = 0, timerInterval, timeLeft = 15;

window.onload = () => {
    updateLeaderboard();
    const select = document.getElementById('chapter-select');
    select.innerHTML = '<option value="all">📚 Mix All (Saare Chapters)</option>';
    const chapters = [...new Set(wordBank.map(item => item.ch))].sort((a, b) => a - b);
    chapters.forEach(chNum => {
        let option = document.createElement('option');
        option.value = chNum; option.innerText = `Chapter ${chNum}`;
        select.appendChild(option);
    });
};

function startQuiz() {
    initAudio(); // Start audio engine
    const nameInput = document.getElementById('user-name').value.trim();
    if(!nameInput) { alert("Pehle student ka naam likhein!"); return; }

    const ch = document.getElementById('chapter-select').value;
    currentWords = (ch === "all") ? [...wordBank] : wordBank.filter(w => w.ch == ch);
    
    if(currentWords.length === 0) { alert("Data error!"); return; }
    
    // Mix questions
    currentWords.sort(() => 0.5 - Math.random()); 
    currentWords = currentWords.slice(0, 10); // Play 10 questions max per game for fun
    
    qIdx = 0; score = 0;
    document.getElementById('display-name').innerText = nameInput;
    document.getElementById('score').innerText = "0";
    document.getElementById('setup-area').style.display = 'none';
    document.getElementById('quiz-area').style.display = 'block';
    
    loadQuestion();
}

function loadQuestion() {
    if(qIdx >= currentWords.length) { showResult(); return; }

    const q = currentWords[qIdx];
    document.getElementById('target-word').innerText = q.w;
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('explanation').style.display = 'none';
    
    // Generate & Shuffle Options
    let options = [q.m];
    while(options.length < 4) {
        let rand = wordBank[Math.floor(Math.random()*wordBank.length)].m;
        if(!options.includes(rand)) options.push(rand);
    }
    options.sort(() => 0.5 - Math.random()); 

    const container = document.getElementById('options-container');
    container.innerHTML = '';
    options.forEach(opt => {
        let btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = opt;
        btn.onclick = () => handleAnswer(btn, opt, q);
        container.appendChild(btn);
    });

    startTimer(q);
}

function startTimer(q) {
    timeLeft = 15;
    document.getElementById('timer-display').innerText = `⏳ ${timeLeft}s`;
    clearInterval(timerInterval);
    
    timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById('timer-display').innerText = `⏳ ${timeLeft}s`;
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            handleAnswer(null, null, q); // Timeout = Wrong Answer
        }
    }, 1000);
}

function handleAnswer(btn, selectedOption, q) {
    clearInterval(timerInterval); // Stop timer
    document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
    
    document.getElementById('hindi-m').innerText = q.h;
    document.getElementById('example-s').innerText = q.e;
    document.getElementById('explanation').style.display = 'block';
    
    if (selectedOption === q.m) {
        playSound('correct');
        btn.classList.add('correct');
        score += 10; // 1 points for correct
        document.getElementById('score').innerText = score;
    } else {
        playSound('wrong');
        if (btn) btn.classList.add('wrong');
        document.querySelectorAll('.option-btn').forEach(b => { 
            if(b.innerText === q.m) b.classList.add('correct'); 
        });
    }
    document.getElementById('next-btn').style.display = 'block';
}

function nextQuestion() { qIdx++; loadQuestion(); }

function showResult() {
    document.getElementById('quiz-area').style.display = 'none';
    document.getElementById('result-area').style.display = 'block';
    document.getElementById('final-score').innerText = score;
    document.getElementById('total-q').innerText = currentWords.length * 10;
    
    saveScore(document.getElementById('user-name').value, score);
}

// --- LEADERBOARD LOGIC ---
function updateLeaderboard() {
    const scores = JSON.parse(localStorage.getItem('mfeScores')) || [];
    scores.sort((a, b) => b.score - a.score); // Highest first
    
    const lbList = document.getElementById('lb-list');
    lbList.innerHTML = '';
    
    if(scores.length === 0) {
        lbList.innerHTML = '<li style="text-align:center; color:#94a3b8;">Abhi koi champion nahi hai!</li>';
    } else {
        scores.slice(0, 5).forEach((s) => {
            let li = document.createElement('li');
            li.innerHTML = `<span style="float:left;">${s.name}</span> <span style="float:right; color:var(--s);">${s.score} Pts</span><div style="clear:both;"></div>`;
            lbList.appendChild(li);
        });
    }
}

function saveScore(name, score) {
    const scores = JSON.parse(localStorage.getItem('mfeScores')) || [];
    scores.push({name, score});
    localStorage.setItem('mfeScores', JSON.stringify(scores));
}

function speakWord() {
    let msg = new SpeechSynthesisUtterance(document.getElementById('target-word').innerText);
    msg.lang = 'en-US';
    window.speechSynthesis.speak(msg);
}
